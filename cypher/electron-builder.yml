appId: com.baron.cypher
productName: Cypher
copyright: Copyright © 2026 Baron

directories:
  buildResources: build
  output: dist

files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.prettierignore,.prettierrc,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

asarUnpack:
  - '**/node_modules/better-sqlite3/**'

win:
  executableName: Cypher
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Cypher

portable:
  artifactName: ${productName}-${version}-portable.${ext}

# Code signing is intentionally left unconfigured for now.
# Unsigned builds trigger a Windows SmartScreen warning on first run;
# we add signing before any wider distribution.
